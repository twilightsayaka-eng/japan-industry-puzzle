<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>日本の工業地帯・工業地域パズル</title>
  <meta name="theme-color" content="#7cc7ff">
  <style>
    :root{
      --bg1:#eef8ff;
      --bg2:#f9fcff;
      --card:#ffffff;
      --main:#1971c2;
      --sub:#5c6770;
      --line:#cfe8ff;
      --accent:#4dabf7;
      --accent2:#74c0fc;
      --ok:#2b8a3e;
      --okbg:#ebfbee;
      --okline:#8ce99a;
      --ng:#e03131;
      --ngbg:#fff5f5;
      --ngline:#ffa8a8;
      --pick:#fff3bf;
      --pickline:#fcc419;
      --shadow:0 12px 28px rgba(0,0,0,.08);
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      color:#333;
    }

    body{
      padding:calc(14px + var(--safe-top)) 12px calc(18px + var(--safe-bottom));
      text-align:center;
      touch-action:none;
    }

    .app{
      max-width:980px;
      margin:0 auto;
    }

    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:#dff1ff;
      color:var(--main);
      font-size:.74rem;
      font-weight:700;
      margin-bottom:10px;
    }

    h1{
      margin:6px 0 8px;
      font-size:1.5rem;
      color:var(--main);
      line-height:1.3;
    }

    .lead{
      margin:0 auto 14px;
      color:var(--sub);
      font-size:.94rem;
      line-height:1.7;
      max-width:760px;
    }

    .panel{
      background:var(--card);
      border:2px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:14px;
    }

    .topbar{
      display:flex;
      gap:8px;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .chip{
      background:#f4faff;
      color:var(--main);
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      font-size:.78rem;
      font-weight:700;
    }

    .map-wrap{
      position:relative;
      width:100%;
      max-width:760px;
      margin:0 auto 14px;
      background:#f8fcff;
      border:2px solid #e7f3ff;
      border-radius:20px;
      padding:12px;
    }

    .map-box{
      position:relative;
      width:100%;
      aspect-ratio: 3 / 2;
      margin:0 auto;
      border-radius:16px;
      overflow:hidden;
      background:#fff;
      border:1px solid #e8f3ff;
    }

    .map-image{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
    }

    .slot{
      position:absolute;
      transform:translate(-50%,-50%);
      min-width:86px;
      min-height:38px;
      padding:6px 8px;
      border-radius:12px;
      border:2px dashed #91c9ff;
      background:rgba(255,255,255,.9);
      color:#7aa7cc;
      font-size:.76rem;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1.3;
      transition:.15s ease;
    }

    .slot.hover{
      border-color:var(--pickline);
      background:var(--pick);
      color:#7a5b00;
      transform:translate(-50%,-50%) scale(1.03);
    }

    .slot.correct{
      border-style:solid;
      border-color:var(--okline);
      background:var(--okbg);
      color:var(--ok);
    }

    .slot.wrong{
      border-style:solid;
      border-color:var(--ngline);
      background:var(--ngbg);
      color:var(--ng);
    }

    .bank{
      margin-top:10px;
      text-align:left;
      position:relative;
      min-height:180px;
    }

    .bank-title{
      text-align:center;
      color:var(--main);
      font-size:.92rem;
      font-weight:700;
      margin-bottom:12px;
    }

    .bank-area{
      position:relative;
      width:100%;
      min-height:150px;
      background:#f8fcff;
      border:2px dashed #d7ebff;
      border-radius:18px;
      overflow:hidden;
    }

    .draggable{
      position:absolute;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:10px 12px;
      min-width:118px;
      min-height:42px;
      border-radius:999px;
      border:2px solid var(--line);
      background:#fff;
      color:var(--main);
      font-size:.88rem;
      font-weight:700;
      box-shadow:0 2px 8px rgba(0,0,0,.05);
      cursor:grab;
      user-select:none;
      touch-action:none;
      z-index:5;
    }

    .draggable.dragging{
      opacity:.92;
      transform:scale(1.04);
      box-shadow:0 8px 24px rgba(0,0,0,.12);
      cursor:grabbing;
      z-index:20;
    }

    .draggable.used{
      background:#edf7ed;
      border-color:#b7e4c7;
      color:#2b8a3e;
    }

    .buttons{
      margin-top:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
    }

    .main-btn{
      width:min(100%,320px);
      padding:14px 20px;
      border:none;
      border-radius:999px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
    }

    .check-btn{
      color:#fff;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 6px 18px rgba(77,171,247,.28);
    }

    .reset-btn{
      background:#f4faff;
      color:var(--main);
      border:2px solid var(--line);
    }

    #result{
      margin-top:14px;
      min-height:3em;
      font-weight:700;
      line-height:1.7;
      font-size:1rem;
    }

    .ok-text{color:var(--ok)}
    .ng-text{color:var(--ng)}

    .note{
      margin-top:12px;
      color:#6f7b84;
      font-size:.78rem;
      line-height:1.7;
    }

    @media (max-width:640px){
      h1{font-size:1.34rem}
      .slot{
        min-width:72px;
        min-height:34px;
        font-size:.68rem;
        padding:5px 6px;
      }
      .draggable{
        min-width:108px;
        min-height:40px;
        font-size:.8rem;
        padding:9px 10px;
      }
      .bank-area{
        min-height:230px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="badge">ドラッグして地図にはめるパズル</div>
    <h1>🗾 日本の工業地帯・工業地域パズル</h1>
    <p class="lead">
      下の名前をドラッグして、日本地図の正しい場所に入れてください。<br>
      全部置いたら「できた！」で答え合わせできます。
    </p>

    <div class="panel">
      <div class="topbar">
        <div class="chip" id="status-chip">下のラベルをドラッグしてください</div>
        <div class="chip" id="count-chip">0 / 10</div>
      </div>

      <div class="map-wrap">
        <div class="map-box" id="map-box">
          <img src="japan-map.png" alt="日本地図" class="map-image">

          <div class="slot" data-key="hokkaido" style="left:76%; top:18%;">ここに入れる</div>
          <div class="slot" data-key="hokuriku" style="left:51%; top:39%;">ここに入れる</div>
          <div class="slot" data-key="keihin" style="left:64%; top:49%;">ここに入れる</div>
          <div class="slot" data-key="keiyo" style="left:71%; top:52%;">ここに入れる</div>
          <div class="slot" data-key="kanto-nairiku" style="left:57%; top:46%;">ここに入れる</div>
          <div class="slot" data-key="chukyo" style="left:50%; top:62%;">ここに入れる</div>
          <div class="slot" data-key="tokai" style="left:58%; top:65%;">ここに入れる</div>
          <div class="slot" data-key="hanshin" style="left:38%; top:70%;">ここに入れる</div>
          <div class="slot" data-key="setouchi" style="left:30%; top:77%;">ここに入れる</div>
          <div class="slot" data-key="kitakyushu" style="left:20%; top:84%;">ここに入れる</div>
        </div>
      </div>

      <div class="bank">
        <div class="bank-title">ラベルをドラッグ</div>
        <div class="bank-area" id="bank-area"></div>
      </div>

      <div class="buttons">
        <button class="main-btn check-btn" onclick="checkAnswer()">できた！</button>
        <button class="main-btn reset-btn" onclick="resetPuzzle()">もう一回あそぶ</button>
      </div>

      <div id="result"></div>

      <div class="note">
        代表的な工業地帯・工業地域10個を使っています。<br>
        京浜・中京・阪神・北九州は工業地帯としてよく学びます。
      </div>
    </div>
  </div>

  <script>
    const items = [
      { key: "hokkaido", label: "北海道工業地域" },
      { key: "keihin", label: "京浜工業地帯" },
      { key: "keiyo", label: "京葉工業地域" },
      { key: "kanto-nairiku", label: "関東内陸工業地域" },
      { key: "hokuriku", label: "北陸工業地域" },
      { key: "chukyo", label: "中京工業地帯" },
      { key: "tokai", label: "東海工業地域" },
      { key: "hanshin", label: "阪神工業地帯" },
      { key: "setouchi", label: "瀬戸内工業地域" },
      { key: "kitakyushu", label: "北九州工業地帯" }
    ];

    const bankArea = document.getElementById("bank-area");
    const slots = [...document.querySelectorAll(".slot")];
    const statusChip = document.getElementById("status-chip");
    const countChip = document.getElementById("count-chip");
    const resultEl = document.getElementById("result");

    let dragged = null;
    let pointerOffsetX = 0;
    let pointerOffsetY = 0;

    function getLabelByKey(key) {
      const found = items.find(i => i.key === key);
      return found ? found.label : "";
    }

    function shuffleArray(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function createLabels() {
      bankArea.innerHTML = "";
      const shuffled = shuffleArray(items);

      const mobile = window.innerWidth <= 640;
      const colWidth = mobile ? 120 : 132;
      const rowHeight = mobile ? 52 : 56;
      const cols = mobile ? 2 : 4;

      shuffled.forEach((item, index) => {
        const label = document.createElement("div");
        label.className = "draggable";
        label.textContent = item.label;
        label.dataset.key = item.key;
        label.dataset.home = "true";

        const col = index % cols;
        const row = Math.floor(index / cols);

        label.style.left = (12 + col * colWidth) + "px";
        label.style.top = (12 + row * rowHeight) + "px";

        label.addEventListener("pointerdown", startDrag);
        bankArea.appendChild(label);
      });

      const rows = Math.ceil(shuffled.length / cols);
      bankArea.style.minHeight = (rows * rowHeight + 24) + "px";
    }

    function startDrag(e) {
      const target = e.currentTarget;
      if (target.classList.contains("used")) return;

      dragged = target;
      dragged.classList.add("dragging");

      const rect = dragged.getBoundingClientRect();
      pointerOffsetX = e.clientX - rect.left;
      pointerOffsetY = e.clientY - rect.top;

      dragged.setPointerCapture(e.pointerId);
      dragged.addEventListener("pointermove", onDragMove);
      dragged.addEventListener("pointerup", endDrag);
      dragged.addEventListener("pointercancel", endDrag);

      statusChip.textContent = "そのまま地図の場所へ動かしてください";
    }

    function onDragMove(e) {
      if (!dragged) return;

      const appRect = document.querySelector(".app").getBoundingClientRect();
      const x = e.clientX - appRect.left - pointerOffsetX;
      const y = e.clientY - appRect.top - pointerOffsetY;

      dragged.style.left = x + "px";
      dragged.style.top = y + "px";
      dragged.style.position = "fixed";

      highlightHoveredSlot(e.clientX, e.clientY);
    }

    function highlightHoveredSlot(clientX, clientY) {
      slots.forEach(slot => slot.classList.remove("hover"));

      const hovered = document.elementFromPoint(clientX, clientY);
      const slot = hovered && hovered.closest(".slot");
      if (slot) slot.classList.add("hover");
    }

    function endDrag(e) {
      if (!dragged) return;

      const dropTarget = document.elementFromPoint(e.clientX, e.clientY);
      const slot = dropTarget && dropTarget.closest(".slot");

      slots.forEach(s => s.classList.remove("hover"));

      if (slot) {
        const currentKey = dragged.dataset.key;

        if (slot.dataset.filledKey) {
          const oldKey = slot.dataset.filledKey;
          const oldLabel = [...document.querySelectorAll(".draggable")].find(el => el.dataset.key === oldKey);
          if (oldLabel) {
            oldLabel.classList.remove("used");
            oldLabel.dataset.placed = "";
          }
        }

        slot.dataset.filledKey = currentKey;
        slot.textContent = getLabelByKey(currentKey);

        dragged.classList.add("used");
        dragged.dataset.placed = "true";

        statusChip.textContent = "つづけてドラッグしてください";
      }

      restoreDraggedVisual();
      updateCount();
    }

    function restoreDraggedVisual() {
      if (!dragged) return;

      dragged.classList.remove("dragging");
      dragged.style.position = "absolute";

      // 使用済みなら銀行に戻すだけ
      dragged.removeEventListener("pointermove", onDragMove);
      dragged.removeEventListener("pointerup", endDrag);
      dragged.removeEventListener("pointercancel", endDrag);

      dragged = null;
    }

    function updateCount() {
      const filled = slots.filter(slot => slot.dataset.filledKey).length;
      countChip.textContent = filled + " / " + items.length;
    }

    function clearMarks() {
      slots.forEach(slot => slot.classList.remove("correct", "wrong"));
    }

    function checkAnswer() {
      clearMarks();

      let correctCount = 0;

      slots.forEach(slot => {
        const expected = slot.dataset.key;
        const actual = slot.dataset.filledKey;

        if (actual === expected) {
          slot.classList.add("correct");
          correctCount++;
        } else {
          slot.classList.add("wrong");
        }
      });

      if (correctCount === items.length) {
        resultEl.className = "ok-text";
        resultEl.innerHTML = "🎉 全問正解です！<br>工業地帯・工業地域の位置がしっかり入っています。";
      } else {
        resultEl.className = "ng-text";
        resultEl.innerHTML = "今の正解数は " + correctCount + " / " + items.length + " です。<br>赤いところを見直してみましょう。";
      }
    }

    function resetPuzzle() {
      resultEl.innerHTML = "";
      resultEl.className = "";
      statusChip.textContent = "下のラベルをドラッグしてください";

      slots.forEach(slot => {
        slot.classList.remove("correct", "wrong", "hover");
        slot.dataset.filledKey = "";
        slot.textContent = "ここに入れる";
      });

      createLabels();
      updateCount();
    }

    resetPuzzle();
    window.addEventListener("resize", resetPuzzle);
  </script>
</body>
</html>
